<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrivChat</title>
<style>
:root {
  --bg:#0f0f13;--bg2:#17171e;--bg3:#1e1e28;--bg4:#252533;
  --accent:#7c6af7;--accent2:#a594ff;--adim:rgba(124,106,247,0.15);
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --green:#4caf82;--red:#f06b6b;
  --r:16px;--rsm:10px;--rxs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* LOGIN */
#login{width:100%;max-width:420px;padding:2rem;animation:fadeUp .35s ease}
.logo{text-align:center;margin-bottom:2rem}
.logo-ring{width:58px;height:58px;border-radius:50%;background:var(--adim);border:1.5px solid var(--accent);display:inline-flex;align-items:center;justify-content:center;margin-bottom:.75rem}
.logo-ring svg{width:26px;height:26px}
.logo h1{font-size:22px;font-weight:600;letter-spacing:-.3px}
.logo p{font-size:13px;color:var(--text3);margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;display:flex;flex-direction:column;gap:1rem}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:15px;padding:10px 14px;outline:none;transition:border-color .2s;font-family:inherit}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}
.hint{font-size:12px;color:var(--text3);background:var(--bg3);border-radius:var(--rxs);padding:9px 12px;border-left:2px solid var(--accent);line-height:1.6}
.hint b{color:var(--text2);font-weight:500}
#err{font-size:13px;color:var(--red);text-align:center;min-height:16px}
#loginBtn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--rsm);padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;font-family:inherit}
#loginBtn:hover{opacity:.86}
#loginBtn:active{transform:scale(.99)}
#loginBtn:disabled{opacity:.45;cursor:default}
#savedList{margin-bottom:1rem}
.saved-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 12px;margin-bottom:6px;cursor:pointer;transition:border-color .2s}
.saved-item:hover{border-color:var(--accent2)}
.saved-item input{display:none}
.saved-item.loaded{background:var(--adim);border-color:var(--accent)}
.saved-info{flex:1;min-width:0}
.saved-nick{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.saved-pass{font-size:11px;color:var(--text3);margin-top:2px}
.saved-del{width:24px;height:24px;background:transparent;border:none;border-radius:var(--rxs);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0}
.saved-del:hover{background:var(--red);color:#fff}
.saved-del svg{width:14px;height:14px}

/* CHAT */
#chat{display:none;width:100%;height:100vh;flex-direction:column;max-width:780px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:12px;padding:13px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.rav{width:38px;height:38px;border-radius:50%;background:var(--adim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent2);flex-shrink:0}
.hdi{flex:1;min-width:0}
.hdi h2{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdi .sub{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot.off{background:var(--text3)}
.hbtn{width:34px;height:34px;background:transparent;border:1px solid var(--border);border-radius:var(--rxs);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.hbtn:hover{background:var(--bg3);color:var(--text)}
.hbtn svg{width:16px;height:16px}
#msgs{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:3px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
#msgs::-webkit-scrollbar{width:4px}
#msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.divider{text-align:center;font-size:11px;color:var(--text3);margin:10px 0 6px;display:flex;align-items:center;gap:10px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.mrow{display:flex;gap:8px;align-items:flex-end;max-width:74%;animation:msgIn .18s ease}
.mrow.own{align-self:flex-end;flex-direction:row-reverse}
.mrow.other{align-self:flex-start}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.mwrap{display:flex;flex-direction:column;position:relative}
.mrow.own .mwrap{align-items:flex-end}
.msender{font-size:11px;color:var(--text3);margin-bottom:3px;padding:0 12px}
.mbubble{padding:9px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;word-break:break-word}
.mrow.own .mbubble{background:rgba(124,106,247,.18);border:1px solid rgba(124,106,247,.28);border-bottom-right-radius:4px;color:#d0ccff}
.mrow.other .mbubble{background:rgba(255,255,255,.05);border:1px solid var(--border);border-bottom-left-radius:4px}
.mtime{font-size:10px;color:var(--text3);margin-top:3px;padding:0 12px}
.mrow.own .mtime{text-align:right}
.pending .mbubble{opacity:.6}
.pending .mbubble::after{content:' ·';animation:blink 1s infinite}
.pdel{position:absolute;right:-28px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:transparent;border:none;border-radius:var(--rxs);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s,background .15s,color .15s}
.pending .pdel{opacity:1}
.pdel:hover{background:var(--red);color:#fff}
.pdel svg{width:12px;height:12px}
@keyframes blink{50%{opacity:.3}}
.sysmsg{text-align:center;font-size:12px;color:var(--text3);padding:6px 0;font-style:italic}
.ftr{padding:12px 20px 16px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.irow{display:flex;align-items:flex-end;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px 8px 16px;transition:border-color .2s}
.irow:focus-within{border-color:var(--accent)}
#minput{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;font-family:inherit;outline:none;resize:none;max-height:120px;line-height:1.5;padding:3px 0;scrollbar-width:none}
#minput::placeholder{color:var(--text3)}
#sendBtn{width:36px;height:36px;background:var(--accent);border:none;border-radius:9px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .1s}
#sendBtn:hover{opacity:.84}
#sendBtn:active{transform:scale(.93)}
#sendBtn:disabled{opacity:.3;cursor:default}
#sendBtn svg{width:16px;height:16px}
.fhint{font-size:11px;color:var(--text3);text-align:center;margin-top:7px;display:flex;align-items:center;justify-content:center;gap:5px}
.badge{display:inline-flex;align-items:center;gap:3px;background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.2);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--green)}
#overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:99}
#overlay.off{display:none}
.spin{width:34px;height:34px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--accent);animation:spin .75s linear infinite}
.otext{font-size:14px;color:var(--text2)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@media(max-width:600px){#msgs{padding:12px 14px}.hdr{padding:11px 14px}.ftr{padding:10px 12px 14px}.mrow{max-width:88%}}
</style>
</head>
<body>

<div id="overlay" class="off">
  <div class="spin"></div>
  <div class="otext" id="otext">Подключение…</div>
</div>

<div id="login">
  <div class="logo">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="1.8" stroke-linecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <h1>PrivChat</h1>
    <p>Приватный мессенджер · без регистрации</p>
  </div>
  <div class="card">
    <div class="field">
      <label>Ваш никнейм</label>
      <input id="uname" type="text" placeholder="как вас видят другие" autocomplete="off" spellcheck="false"/>
    </div>
    <div class="field">
      <label>Пароль комнаты</label>
      <input id="rpass" type="password" placeholder="общий секрет для входа"/>
    </div>
    <div class="hint">
      <b>Как работает:</b> пароль хешируется в уникальный ID канала — войти могут только те, кто знает тот же пароль. Регистрации нет, всё анонимно. История хранится 24 часа.
    </div>
    <div id="savedList"></div>
    <div id="err"></div>
    <button id="loginBtn">Войти в комнату</button>
  </div>
</div>

<div id="chat">
  <div class="hdr">
    <div class="rav" id="rav">##</div>
    <div class="hdi">
      <h2 id="rname">Комната</h2>
      <div class="sub"><div class="dot off" id="sdot"></div><span id="stext">—</span></div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="hbtn" id="copyBtn" title="Скопировать приглашение">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <button class="hbtn" id="logoutBtn" title="Выйти">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="msgs"></div>

  <div class="ftr">
    <div class="irow">
      <textarea id="minput" rows="1" placeholder="Написать сообщение…" maxlength="2000"></textarea>
      <button id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="fhint">
      <span class="badge">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        ntfy.sh
      </span>
      приватный канал · только с вашим паролем
    </div>
  </div>
</div>

<script>
const NTFY='https://ntfy.sh';
let S={topic:'',nick:'',since:0,timer:null,known:new Set(),pending:null};
const $=id=>document.getElementById(id);
const STORAGE_KEY='privchat_saved';
const getSaved=()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{return[]}};
const saveCred=(nick,pass)=>{const a=getSaved();const i=a.findIndex(x=>x.n===nick);if(i>=0)a[i].p=pass;else a.unshift({n:nick,p:pass});localStorage.setItem(STORAGE_KEY,JSON.stringify(a.slice(0,20)));renderSaved()};
const delCred=(nick)=>{const a=getSaved().filter(x=>x.n!==nick);localStorage.setItem(STORAGE_KEY,JSON.stringify(a));renderSaved()};
const renderSaved=()=>{const c=$('savedList'),v=$('uname').value.trim(),p=$('rpass').value,sel=getSaved().find(x=>x.n===v&&x.p===p);c.innerHTML=getSaved().map(x=>`<div class="saved-item${sel&&x.n===sel.n?' loaded':''}" data-n="${x.n}" data-p="${x.p}"><div class="saved-info"><div class="saved-nick">${x.n}</div><div class="saved-pass">••••••</div></div><button class="saved-del" title="Удалить"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>`).join('');c.querySelectorAll('.saved-item').forEach(el=>{el.addEventListener('click',e=>{if(e.target.closest('.saved-del'))return;$('uname').value=el.dataset.n;$('rpass').value=el.dataset.p;renderSaved()});el.querySelector('.saved-del').addEventListener('click',e=>{e.stopPropagation();delCred(el.dataset.n)})})}
const COLORS=['#7c6af7','#4caf82','#f06b6b','#f0a050','#50c8f0','#c070e8','#7ad4a0','#f07090','#e8c84a'];

function strColor(s){let h=5381;for(let c of s)h=((h<<5)+h)^c.charCodeAt(0);return COLORS[Math.abs(h)%COLORS.length]}
function initials(s){return s.slice(0,2).toUpperCase()}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}
function fmtDate(ts){return new Date(ts).toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}

async function sha256hex(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function showLoad(t){$('otext').textContent=t;$('overlay').classList.remove('off')}
function hideLoad(){$('overlay').classList.add('off')}
function setStatus(on,txt){$('sdot').className='dot'+(on?'':' off');$('stext').textContent=txt}
function scrollBot(){const m=$('msgs');m.scrollTop=m.scrollHeight}

async function doLogin(){
  const nick=$('uname').value.trim();
  const pass=$('rpass').value;
  $('err').textContent='';
  if(!nick){$('err').textContent='Введите никнейм';return}
  if(!pass){$('err').textContent='Введите пароль комнаты';return}
  if(nick.length>40){$('err').textContent='Никнейм слишком длинный';return}
  $('loginBtn').disabled=true;
  showLoad('Генерация ключа комнаты…');

  const hash=await sha256hex('privchat:v2:'+pass);
  S.topic='pc-'+hash.slice(0,32);
  S.nick=nick;
  S.since=0;
  S.known=new Set();
  S.pending=null;
  saveCred(nick,pass);

  const label=hash.slice(0,6).toUpperCase();
  $('rname').textContent='Комната #'+label;
  $('rav').textContent=label.slice(0,2);

  showLoad('Загрузка истории…');
  try{
    await loadHistory();
    hideLoad();
    $('login').style.display='none';
    $('chat').style.display='flex';
    setStatus(true,'в эфире');
    startPoll();
  }catch(e){
    hideLoad();
    $('loginBtn').disabled=false;
    $('err').textContent='Ошибка подключения: '+e.message;
  }
}

async function loadHistory(){
  const res=await fetch(`${NTFY}/${S.topic}/json?poll=1&since=all`,{
    headers:{Accept:'application/x-ndjson'}
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const text=await res.text();
  $('msgs').innerHTML='';
  let lastDate='',maxT=0;
  for(const line of text.trim().split('\n').filter(Boolean)){
    try{
      const ev=JSON.parse(line);
      if(ev.event!=='message') continue;
      const ts=ev.time*1000;
      if(ev.time>maxT) maxT=ev.time;
      const d=fmtDate(ts);
      if(d!==lastDate){appendDiv(d);lastDate=d}
      appendMsg(ev,false);
      S.known.add(ev.id);
    }catch(e){}
  }
  if(S.known.size===0){
    const el=document.createElement('div');
    el.className='sysmsg';
    el.textContent='Комната пуста. Поделитесь паролем — и друзья окажутся здесь.';
    $('msgs').appendChild(el);
  }
  S.since=maxT||Math.floor(Date.now()/1000);
  scrollBot();
}

function appendMsg(ev,animate,pending){
  if(S.known.has(ev.id)) return;
  S.known.add(ev.id);
  let nick='?',text='';
  try{const d=JSON.parse(ev.message||'{}');nick=d.n||'?';text=d.t||ev.message}
  catch(e){text=ev.message||''}
  const isOwn=(nick===S.nick);
  const color=strColor(nick);
  const ts=(ev.time||0)*1000;

  const row=document.createElement('div');
  row.className='mrow '+(isOwn?'own':'other');
  if(pending) row.classList.add('pending');
  if(!animate) row.style.animation='none';

  if(!isOwn){
    const av=document.createElement('div');
    av.className='mav';
    av.style.background=color+'2a';
    av.style.color=color;
    av.textContent=initials(nick);
    row.appendChild(av);
  }

  const wrap=document.createElement('div');
  wrap.className='mwrap';
  wrap.style.position='relative';

  if(!isOwn){
    const snd=document.createElement('div');
    snd.className='msender';
    snd.style.color=color;
    snd.textContent=nick;
    wrap.appendChild(snd);
  }

  const bub=document.createElement('div');
  bub.className='mbubble';
  bub.textContent=text;
  wrap.appendChild(bub);

  if(pending){
    const del=document.createElement('button');
    del.className='pdel';
    del.title='Удалить';
    del.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    del.onclick=()=>{row.remove();S.pendingDelete=true};
    wrap.appendChild(del);
  }

  const tm=document.createElement('div');
  tm.className='mtime';
  tm.textContent=fmtTime(ts||Date.now());
  wrap.appendChild(tm);

  row.appendChild(wrap);
  $('msgs').appendChild(row);
}

function appendDiv(label){
  const d=document.createElement('div');
  d.className='divider';
  d.textContent=label;
  $('msgs').appendChild(d);
}

function startPoll(){
  if(S.timer) clearInterval(S.timer);
  S.timer=setInterval(poll,2500);
}

async function poll(){
  try{
    const res=await fetch(`${NTFY}/${S.topic}/json?poll=1&since=${S.since}`,{
      headers:{Accept:'application/x-ndjson'}
    });
    if(!res.ok) throw new Error(res.status);
    const text=await res.text();
    const m=$('msgs');
    const atBot=m.scrollHeight-m.scrollTop-m.clientHeight<80;
    let got=false,maxT=S.since;
    const pendingRows=m.querySelectorAll('.pending');
    for(const line of text.trim().split('\n').filter(Boolean)){
      try{
        const ev=JSON.parse(line);
        if(ev.event!=='message'||S.known.has(ev.id)) continue;
        const msgText=JSON.parse(ev.message||'{}').t||'';
        pendingRows.forEach(row=>{if(row.querySelector('.mbubble').textContent===msgText)row.remove()});
        const ts=ev.time*1000;
        const d=fmtDate(ts);
        const last=m.querySelector('.divider:last-of-type');
        if(!last||last.textContent!==d) appendDiv(d);
        appendMsg(ev,true);
        if(ev.time>maxT) maxT=ev.time;
        got=true;
      }catch(e){}
    }
    if(maxT>S.since) S.since=maxT;
    if(got&&atBot) scrollBot();
    const remaining=m.querySelector('.pending');
    if(!remaining)S.pending=null;
    setStatus(true,'в эфире');
  }catch(e){
    setStatus(false,'нет связи…');
  }
}

async function sendMsg(){
  const inp=$('minput');
  const text=inp.value.trim();
  if(!text) return;
  const id='p'+Date.now();
  const ev={id,message:JSON.stringify({n:S.nick,t:text}),time:Math.floor(Date.now()/1000)};
  appendMsg(ev,true,true);
  scrollBot();
  inp.value='';autoResize();
  $('sendBtn').disabled=true;
  S.pending={id,text};
  try{
    await fetch(`${NTFY}/${S.topic}`,{
      method:'POST',
      body:JSON.stringify({n:S.nick,t:text}),
    });
    S.pending=null;
    await poll();
  }catch(e){
    S.pending={id,text};
    setStatus(false,'нет связи…');
  }
  $('sendBtn').disabled=($('minput').value.trim()==='');
  inp.focus();
}

$('copyBtn').addEventListener('click',async()=>{
  const msg=`Открой этот файл / страницу PrivChat и введи тот же пароль комнаты.`;
  try{await navigator.clipboard.writeText(msg)}catch(e){}
  const b=$('copyBtn');
  b.style.color='var(--green)';
  setTimeout(()=>b.style.color='',1800);
});

$('logoutBtn').addEventListener('click',()=>{
  if(!confirm('Выйти из комнаты?')) return;
  clearInterval(S.timer);
  S={topic:'',nick:'',since:0,timer:null,known:new Set(),pending:null};
  $('chat').style.display='none';
  $('login').style.display='';
  $('loginBtn').disabled=false;
  $('uname').value='';$('rpass').value='';$('err').textContent='';
});

function autoResize(){
  const t=$('minput');t.style.height='auto';
  t.style.height=Math.min(t.scrollHeight,120)+'px';
}
$('minput').addEventListener('input',()=>{
  autoResize();
  $('sendBtn').disabled=$('minput').value.trim()==='';
});
$('minput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!$('sendBtn').disabled)sendMsg()}
});
$('sendBtn').addEventListener('click',sendMsg);
$('loginBtn').addEventListener('click',doLogin);
$('rpass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
$('uname').addEventListener('keydown',e=>{if(e.key==='Enter')$('rpass').focus()});
$('uname').addEventListener('input',renderSaved);
$('rpass').addEventListener('input',renderSaved);
</script>
</body>
</html>
