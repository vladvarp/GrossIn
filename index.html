<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ChrisoChat</title>
<style>
:root{
  --bg:#0f0f13;--bg2:#17171e;--bg3:#1e1e28;--bg4:#252533;
  --accent:#7c6af7;--accent2:#a594ff;--adim:rgba(124,106,247,0.15);
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --green:#4caf82;--red:#f06b6b;--amber:#f0a050;
  --r:16px;--rsm:10px;--rxs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* ── LOGIN ── */
#login{width:100%;max-width:440px;padding:1.5rem;animation:fadeUp .35s ease;overflow-y:auto;max-height:100vh}
.logo{text-align:center;margin-bottom:1.5rem}
.logo-ring{width:56px;height:56px;border-radius:50%;background:var(--adim);border:1.5px solid var(--accent);display:inline-flex;align-items:center;justify-content:center;margin-bottom:.65rem}
.logo-ring svg{width:25px;height:25px}
.logo h1{font-size:21px;font-weight:600;letter-spacing:-.3px}
.logo p{font-size:12px;color:var(--text3);margin-top:3px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;display:flex;flex-direction:column;gap:.9rem}

.field{position:relative}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:15px;padding:10px 14px;outline:none;transition:border-color .2s;font-family:inherit}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}
.input-with-btn{display:flex;gap:6px}
.input-with-btn input{flex:1}
.gen-btn{width:42px;height:42px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
.gen-btn:hover{background:var(--bg4);color:var(--accent2)}
.gen-btn svg{width:20px;height:20px}

/* saved chips row */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;min-height:0}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg4);border:1px solid var(--border2);border-radius:20px;padding:3px 10px 3px 10px;font-size:12px;color:var(--text2);cursor:pointer;transition:background .15s,color .15s;max-width:160px}
.chip:hover{background:var(--bg3);color:var(--text)}
.chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-del{width:14px;height:14px;border-radius:50%;background:transparent;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;line-height:1;padding:0;margin-left:1px;transition:color .15s,background .15s}
.chip-del:hover{color:var(--red);background:rgba(240,107,107,0.12)}

/* section toggle headers */
.sec-hdr{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;margin-bottom:0}
.sec-hdr span{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.7px}
.sec-hdr .arrow{font-size:10px;color:var(--text3);transition:transform .2s}
.sec-hdr.open .arrow{transform:rotate(90deg)}
.sec-body{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sec-body.open{max-height:200px}

.hint{font-size:12px;color:var(--text3);background:var(--bg3);border-radius:var(--rxs);padding:8px 12px;border-left:2px solid var(--accent);line-height:1.55}
.hint b{color:var(--text2);font-weight:500}
#err{font-size:13px;color:var(--red);text-align:center;min-height:14px;line-height:1.4}
#loginBtn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--rsm);padding:11px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;font-family:inherit}
#loginBtn:hover{opacity:.86}
#loginBtn:active{transform:scale(.99)}
#loginBtn:disabled{opacity:.45;cursor:default}

/* ── CHAT ── */
#chat{display:none;width:100%;height:100vh;height:100dvh;flex-direction:column;max-width:780px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 18px;padding-top:calc(12px + env(safe-area-inset-top));background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.rav{width:38px;height:38px;border-radius:50%;background:var(--adim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent2);flex-shrink:0}
.hdi{flex:1;min-width:0}
.hdi h2{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdi .sub{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot.off{background:var(--text3)}
.dot.warn{background:var(--amber)}
.hbtn{width:34px;height:34px;background:transparent;border:1px solid var(--border);border-radius:var(--rxs);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.hbtn:hover{background:var(--bg3);color:var(--text)}
.hbtn svg{width:16px;height:16px}

#msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:3px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
#msgs::-webkit-scrollbar{width:4px}
#msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

.divider{text-align:center;font-size:11px;color:var(--text3);margin:10px 0 6px;display:flex;align-items:center;gap:10px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.mrow{display:flex;gap:8px;align-items:flex-end;max-width:74%;animation:msgIn .18s ease}
.mrow.own{align-self:flex-end;flex-direction:row-reverse}
.mrow.other{align-self:flex-start}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.mwrap{display:flex;flex-direction:column}
.mrow.own .mwrap{align-items:flex-end}
.msender{font-size:11px;margin-bottom:3px;padding:0 12px}
.mbubble{padding:9px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;word-break:break-word}
.mrow.own .mbubble{background:rgba(124,106,247,.18);border:1px solid rgba(124,106,247,.28);border-bottom-right-radius:4px;color:#d0ccff}
.mrow.other .mbubble{background:rgba(255,255,255,.05);border:1px solid var(--border);border-bottom-left-radius:4px}
/* pending / failed states */
.mrow.pending .mbubble{opacity:.55}
.mrow.failed .mbubble{border-color:rgba(240,107,107,.4);background:rgba(240,107,107,.08)}
.mtime{font-size:10px;color:var(--text3);margin-top:3px;padding:0 12px;display:flex;align-items:center;gap:4px}
.mrow.own .mtime{justify-content:flex-end}
.mtime .mstatus{font-size:10px}
.mtime .mstatus.sending{color:var(--text3)}
.mtime .mstatus.fail{color:var(--red)}
.mtime .mstatus.ok{color:var(--green)}
.retry-btn{font-size:11px;color:var(--accent2);background:none;border:none;cursor:pointer;padding:0;margin-left:4px;text-decoration:underline}
.sysmsg{text-align:center;font-size:12px;color:var(--text3);padding:6px 0;font-style:italic}

/* ── FOOTER ── */
.ftr{padding:10px 18px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.irow{display:flex;align-items:flex-end;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px 8px 15px;transition:border-color .2s}
.irow:focus-within{border-color:var(--accent)}
#minput{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;font-family:inherit;outline:none;resize:none;max-height:120px;line-height:1.5;padding:3px 0;scrollbar-width:none}
#minput::placeholder{color:var(--text3)}
#sendBtn{width:36px;height:36px;background:var(--accent);border:none;border-radius:9px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .1s}
#sendBtn:hover{opacity:.84}
#sendBtn:active{transform:scale(.93)}
#sendBtn:disabled{opacity:.3;cursor:default}
#sendBtn svg{width:16px;height:16px}
.fhint{font-size:11px;color:var(--text3);text-align:center;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:5px}
.badge{display:inline-flex;align-items:center;gap:3px;background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.2);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--green)}

/* ── OVERLAY ── */
#overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:99}
#overlay.off{display:none}
.spin{width:34px;height:34px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--accent);animation:spin .75s linear infinite}
.otext{font-size:14px;color:var(--text2)}
.oretry{font-size:12px;color:var(--text3)}

@keyframes spin{to{transform:rotate(360deg)}}
#dialog{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center}
#dialog.off{display:none}
.dialog-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.7)}
.dialog-box{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;max-width:300px;width:85%;text-align:center;animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.dialog-title{font-size:17px;font-weight:600;margin-bottom:8px;color:var(--text)}
.dialog-msg{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.dialog-btns{display:flex;gap:10px;justify-content:center}
.dialog-btns button{flex:1;padding:10px 16px;border-radius:var(--rsm);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.dialog-btns .dok{background:var(--accent);color:#fff}
.dialog-btns .dcancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.dialog-btns button:hover{opacity:.85}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@media(max-width:600px){#msgs{padding:10px 12px}.hdr{padding:10px 12px}.ftr{padding:8px 10px 12px}.mrow{max-width:88%}}
</style>
</head>
<body>

<div id="overlay" class="off">
  <div class="spin"></div>
  <div class="otext" id="otext">Крысиное подключение…</div>
  <div class="oretry" id="oretry"></div>
</div>

<div id="dialog" class="off">
  <div class="dialog-backdrop"></div>
  <div class="dialog-box">
    <div class="dialog-title" id="dialogTitle"></div>
    <div class="dialog-msg" id="dialogMsg"></div>
    <div class="dialog-btns" id="dialogBtns"></div>
  </div>
</div>

<!-- ══ LOGIN ══ -->
<div id="login">
  <div class="logo">
    <div class="logo-ring">
      <span style="font-size:26px">🐀</span>
    </div>
    <h1>ChrisoChat</h1>
    <p>Крысиный мессенджер · без СМС и регистраций</p>
  </div>

  <div class="card">

    <!-- Nickname -->
    <div class="field">
      <label>Ваш никнейм</label>
      <input id="uname" type="text" placeholder="Как вас видят другие крысы" autocomplete="off" spellcheck="false"/>
      <!-- Saved nicks -->
      <div class="sec-hdr" id="nickSecHdr" style="margin-top:7px">
        <span>▶</span><span>Персоны</span><span class="arrow">›</span>
      </div>
      <div class="sec-body" id="nickSecBody">
        <div class="chips" id="nickChips" style="margin-top:6px"></div>
      </div>
    </div>

    <!-- Room password -->
    <div class="field">
      <label>Пароль логово</label>
      <div class="input-with-btn">
        <input id="rpass" type="password" placeholder="Секрет для входа"/>
        <button id="pastePass" class="gen-btn" title="Вставить из буфера">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
        </button>
        <button id="genPass" class="gen-btn" title="Сгенерировать пароль">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="8" r="1.5" fill="currentColor"/><circle cx="8" cy="16" r="1.5" fill="currentColor"/><circle cx="16" cy="16" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <!-- Saved rooms -->
      <div class="sec-hdr" id="roomSecHdr" style="margin-top:7px">
        <span>▶</span><span>Норы</span><span class="arrow">›</span>
      </div>
      <div class="sec-body" id="roomSecBody">
        <div class="chips" id="roomChips" style="margin-top:6px"></div>
      </div>
    </div>

    <div class="hint">
      <b>Как работает:</b> пароль хешируется в уникальный ID канала. Попасть в нору могут только те крысы, кто знает тот же пароль. Регистрации нет. История 24 ч.
    </div>
    <div id="err"></div>
    <button id="loginBtn">Войти в нору</button>
  </div>
</div>

<!-- ══ CHAT ══ -->
<div id="chat">
  <div class="hdr">
    <div class="rav" id="rav">##</div>
    <div class="hdi">
      <h2 id="rname">Нора</h2>
      <div class="sub"><div class="dot off" id="sdot"></div><span id="stext">—</span></div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="hbtn" id="copyBtn" title="Скопировать пароль комнаты">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <button class="hbtn" id="logoutBtn" title="Выйти">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="msgs"></div>

  <div class="ftr">
    <div class="irow">
      <textarea id="minput" rows="1" placeholder="Написать сообщение…" maxlength="2000"></textarea>
      <button id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<script>
/* ════════════════════════════════
   CONFIG
════════════════════════════════ */
const NTFY='https://ntfy.sh';
const MAX_RETRY_LOGIN=4;   // retries on connect
const MAX_RETRY_SEND=5;    // retries on send
const POLL_MS=2500;

/* ════════════════════════════════
   STATE
════════════════════════════════ */
let S={
  topic:'',nick:'',pass:'',
  since:0,timer:null,
  known:new Set(),
  queue:[],          // pending messages {id,text,el}
  sending:false,
};

/* ════════════════════════════════
   STORAGE — nicks & rooms
════════════════════════════════ */
function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch{return[]}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function savedNicks(){return lsGet('pc_nicks')}
function savedRooms(){return lsGet('pc_rooms')}

function saveNick(n){
  if(!n) return;
  const arr=[n,...savedNicks().filter(x=>x!==n)].slice(0,12);
  lsSet('pc_nicks',arr);
}
function saveRoom(p){
  if(!p) return;
  const arr=[p,...savedRooms().filter(x=>x!==p)].slice(0,12);
  lsSet('pc_rooms',arr);
}
function deleteNick(n){lsSet('pc_nicks',savedNicks().filter(x=>x!==n));renderChips()}
function deleteRoom(p){lsSet('pc_rooms',savedRooms().filter(x=>x!==p));renderChips()}

function getLastUsed(){try{return JSON.parse(localStorage.getItem('pc_last')||'null')}catch{return null}}
function setLastUsed(nick,room){localStorage.setItem('pc_last',JSON.stringify({n:nick,r:room}))}

function renderChips(){
  const nc=$('nickChips'), rc=$('roomChips');
  nc.innerHTML=''; rc.innerHTML='';

  for(const n of savedNicks()){
    const ch=document.createElement('div');
    ch.className='chip';
    const sp=document.createElement('span'); sp.textContent=n;
    const del=document.createElement('button'); del.className='chip-del';
    del.innerHTML='×'; del.title='Удалить';
    del.onclick=e=>{e.stopPropagation();deleteNick(n)};
    ch.appendChild(sp); ch.appendChild(del);
    ch.onclick=()=>{$('uname').value=n};
    nc.appendChild(ch);
  }

  for(const p of savedRooms()){
    const preview=p.length>18?p.slice(0,16)+'…':p;
    const ch=document.createElement('div');
    ch.className='chip';
    const sp=document.createElement('span'); sp.textContent=preview; sp.title=p;
    const del=document.createElement('button'); del.className='chip-del';
    del.innerHTML='×'; del.title='Удалить';
    del.onclick=e=>{e.stopPropagation();deleteRoom(p)};
    ch.appendChild(sp); ch.appendChild(del);
    ch.onclick=()=>{$('rpass').value=p};
    rc.appendChild(ch);
  }
}

/* section toggle */
function initSec(hdrId,bodyId){
  const hdr=$(''+hdrId), body=$(''+bodyId);
  hdr.addEventListener('click',()=>{
    const open=body.classList.contains('open');
    body.classList.toggle('open',!open);
    hdr.classList.toggle('open',!open);
  });
}

/* ════════════════════════════════
   UTILS
════════════════════════════════ */
const $=id=>document.getElementById(id);

function dialog(title,msg,btns,callback){
  $('dialogTitle').textContent=title;
  $('dialogMsg').textContent=msg;
  $('dialogBtns').innerHTML=btns.map((b,i)=>`<button class="${b.ok?'dok':'dcancel'}" data-idx="${i}">${b.label}</button>`).join('');
  $('dialogBtns').querySelectorAll('button').forEach((el,i)=>el.onclick=()=>{closeDialog();callback(i)});
  $('dialog').classList.remove('off');
}
function closeDialog(){$('dialog').classList.add('off')}
function alert(title,msg,btn,cb){dialog(title,msg,[{label:btn||'ОК',ok:true}],cb||(()=>{}))}
function confirm(title,msg,ok,onOk){dialog(title,msg,[{label:'Отмена',ok:false},{label:ok||'ОК',ok:true}],onOk)}
const COLORS=['#7c6af7','#4caf82','#f06b6b','#f0a050','#50c8f0','#c070e8','#7ad4a0','#f07090','#e8c84a'];
function strColor(s){let h=5381;for(const c of s)h=((h<<5)+h)^c.charCodeAt(0);return COLORS[Math.abs(h)%COLORS.length]}
function initials(s){return s.slice(0,2).toUpperCase()}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}
function fmtDate(ts){return new Date(ts).toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}

async function sha256hex(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function showLoad(t,sub=''){
  $('otext').textContent=t;
  $('oretry').textContent=sub;
  $('overlay').classList.remove('off');
}
function hideLoad(){$('overlay').classList.add('off')}
function setStatus(state,txt){
  const dot=$('sdot');
  dot.className='dot'+(state==='on'?'':state==='warn'?' warn':' off');
  $('stext').textContent=txt;
}
function scrollBot(){const m=$('msgs');m.scrollTop=m.scrollHeight}

/* ════════════════════════════════
   LOGIN with retry
════════════════════════════════ */
async function doLogin(){
  const nick=$('uname').value.trim();
  const pass=$('rpass').value;
  $('err').textContent='';
  if(!nick){$('err').textContent='Введите никнейм';return}
  if(!pass){$('err').textContent='Введите пароль норы';return}
  if(nick.length>25){$('err').textContent='Ты случайно не Бенедикт Камбербэтч? Хотя даже он покороче будет. У нас лимит на символы, а не на амбиции. Мы тут чат делаем, а не надпись на надгробии.';return}
  $('loginBtn').disabled=true;

  showLoad('Генерация ключа…','');
  const hash=await sha256hex('privchat:v2:'+pass);
  S.topic='pc-'+hash.slice(0,32);
  S.nick=nick;
  S.pass=pass;
  S.since=0;
  S.known=new Set();
  S.queue=[];

  const label=hash.slice(0,6).toUpperCase();
  $('rname').textContent='Нора #'+label;
  $('rav').textContent=label.slice(0,2);

  /* retry loop */
  let lastErr='';
  for(let attempt=1;attempt<=MAX_RETRY_LOGIN;attempt++){
    showLoad(
      attempt===1?'Загрузка истории…':`Попытка ${attempt} из ${MAX_RETRY_LOGIN}…`,
      lastErr?`Предыдущая ошибка: ${lastErr}`:''
    );
    try{
      await loadHistory();
      hideLoad();
      saveNick(nick);
      saveRoom(pass);
      setLastUsed(nick,pass);
      renderChips();
      $('login').style.display='none';
      $('chat').style.display='flex';
      scrollBot();
      setStatus('on','в эфире');
      startPoll();
      return;
    }catch(e){
      lastErr=e.message||String(e);
      if(attempt<MAX_RETRY_LOGIN){
        await sleep(800*attempt);
      }
    }
  }
  hideLoad();
  $('loginBtn').disabled=false;
  $('err').textContent='Не удалось подключиться: '+lastErr;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

/* ════════════════════════════════
   HISTORY
════════════════════════════════ */
async function loadHistory(){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),8000);
  let res;
  try{
    res=await fetch(`${NTFY}/${S.topic}/json?poll=1&since=all`,{
      headers:{Accept:'application/x-ndjson'},
      signal:ctrl.signal,
    });
  }finally{clearTimeout(tid)}
  if(!res.ok) throw new Error('HTTP '+res.status);
  const text=await res.text();
  $('msgs').innerHTML='';
  let lastDate='',maxT=0;
  for(const line of text.trim().split('\n').filter(Boolean)){
    try{
      const ev=JSON.parse(line);
      if(ev.event!=='message') continue;
      const ts=ev.time*1000;
      if(ev.time>maxT) maxT=ev.time;
      const d=fmtDate(ts);
      if(d!==lastDate){appendDiv(d);lastDate=d}
      appendMsg(ev,false);
      S.known.add(ev.id);
    }catch(_){}
  }
  if(S.known.size===0){
    const el=document.createElement('div');
    el.className='sysmsg';
    el.textContent='Нора пуста. Поделитесь паролем — и крыса окажутся здесь.';
    $('msgs').appendChild(el);
  }
  S.since=maxT||Math.floor(Date.now()/1000);
  scrollBot();
}

/* ════════════════════════════════
   RENDER MESSAGE
════════════════════════════════ */
function appendMsg(ev,animate){
  if(S.known.has(ev.id)) return;
  S.known.add(ev.id);
  let nick='?',text='';
  try{const d=JSON.parse(ev.message||'{}');nick=d.n||'?';text=d.t||ev.message}
  catch(_){text=ev.message||''}
  buildMsgEl({nick,text,ts:(ev.time||0)*1000,state:'ok',animate,id:ev.id});
}

function buildMsgEl({nick,text,ts,state,animate,id,pending}){
  const isOwn=(nick===S.nick);
  const color=strColor(nick);

  const row=document.createElement('div');
  row.className='mrow '+(isOwn?'own':'other')+(state==='pending'?' pending':state==='failed'?' failed':'');
  if(!animate) row.style.animation='none';
  if(id) row.dataset.msgId=id;
  if(pending) row.dataset.pendingId=pending;

  if(!isOwn){
    const av=document.createElement('div');
    av.className='mav';
    av.style.background=color+'2a';
    av.style.color=color;
    av.textContent=initials(nick);
    row.appendChild(av);
  }

  const wrap=document.createElement('div');
  wrap.className='mwrap';

  if(!isOwn){
    const snd=document.createElement('div');
    snd.className='msender';
    snd.style.color=color;
    snd.textContent=nick;
    wrap.appendChild(snd);
  }

  const bub=document.createElement('div');
  bub.className='mbubble';
  bub.textContent=text;
  wrap.appendChild(bub);

  const tm=document.createElement('div');
  tm.className='mtime';
  tm.textContent=fmtTime(ts||Date.now());

  if(isOwn){
    const st=document.createElement('span');
    st.className='mstatus '+(state==='pending'?'sending':state==='failed'?'fail':'ok');
    st.textContent=state==='pending'?'отправка…':state==='failed'?'ошибка':'✓';
    tm.appendChild(st);
    if(state==='failed'&&pending){
      const rb=document.createElement('button');
      rb.className='retry-btn';rb.textContent='повторить';
      rb.onclick=()=>retryPending(pending);
      tm.appendChild(rb);
    }
  }
  wrap.appendChild(tm);
  row.appendChild(wrap);
  $('msgs').appendChild(row);
  return row;
}

function appendDiv(label){
  const d=document.createElement('div');
  d.className='divider';d.textContent=label;
  $('msgs').appendChild(d);
}

/* ════════════════════════════════
   POLLING
════════════════════════════════ */
function startPoll(){
  if(S.timer) clearInterval(S.timer);
  S.timer=setInterval(poll,POLL_MS);
}

async function poll(){
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),5000);
    let res;
    try{
      res=await fetch(`${NTFY}/${S.topic}/json?poll=1&since=${S.since}`,{
        headers:{Accept:'application/x-ndjson'},
        signal:ctrl.signal,
      });
    }finally{clearTimeout(tid)}
    if(!res.ok) throw new Error(res.status);
    const text=await res.text();
    const m=$('msgs');
    const atBot=m.scrollHeight-m.scrollTop-m.clientHeight<80;
    let got=false,maxT=S.since;
    for(const line of text.trim().split('\n').filter(Boolean)){
      try{
        const ev=JSON.parse(line);
        if(ev.event!=='message'||S.known.has(ev.id)) continue;
        const ts=ev.time*1000;
        const d=fmtDate(ts);
        const last=m.querySelector('.divider:last-of-type');
        if(!last||last.textContent!==d) appendDiv(d);
        appendMsg(ev,true);
        if(ev.time>maxT) maxT=ev.time;
        got=true;
      }catch(_){}
    }
    if(maxT>S.since) S.since=maxT;
    if(got&&atBot) scrollBot();
    setStatus('on','в эфире');

    /* flush send queue */
    flushQueue();
  }catch(e){
    setStatus('warn','нет связи…');
  }
}

/* ════════════════════════════════
   OPTIMISTIC SEND + QUEUE
════════════════════════════════ */
let pendingSeq=0;

async function sendMsg(){
  const inp=$('minput');
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';autoResize();
  $('sendBtn').disabled=true;

  /* show optimistic bubble immediately */
  const pid='p'+(++pendingSeq);
  const m=$('msgs');
  const atBot=m.scrollHeight-m.scrollTop-m.clientHeight<80;

  /* day divider if needed */
  const d=fmtDate(Date.now());
  const last=m.querySelector('.divider:last-of-type');
  if(!last||last.textContent!==d) appendDiv(d);

  buildMsgEl({nick:S.nick,text,ts:Date.now(),state:'pending',animate:true,pending:pid});
  scrollBot();

  /* add to queue and start flush */
  S.queue.push({pid,text,attempts:0});
  flushQueue();

  $('sendBtn').disabled=false;
  inp.focus();
}

let flushing=false;
async function flushQueue(){
  if(flushing||S.queue.length===0) return;
  flushing=true;
  while(S.queue.length>0){
    const item=S.queue[0];
    const success=await trySend(item);
    if(success){
      /* remove optimistic bubble immediately on success */
      const el=document.querySelector(`[data-pending-id="${item.pid}"]`);
      if(el) el.remove();
      S.queue.shift();
    } else {
      item.attempts++;
      if(item.attempts>=MAX_RETRY_SEND){
        setPendingState(item.pid,'failed');
        S.queue.shift();
      } else {
        await sleep(600*Math.min(item.attempts,4));
      }
    }
  }
  flushing=false;
}

async function trySend(item){
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),6000);
    let res;
    try{
      res=await fetch(`${NTFY}/${S.topic}`,{
        method:'POST',
        body:JSON.stringify({n:S.nick,t:item.text}),
        signal:ctrl.signal,
      });
    }finally{clearTimeout(tid)}
    if(!res.ok) return false;
    return true;
  }catch(_){return false}
}

function setPendingState(pid,state){
  const el=document.querySelector(`[data-pending-id="${pid}"]`);
  if(!el) return;
  el.classList.toggle('pending',state==='pending');
  el.classList.toggle('failed',state==='failed');
  const st=el.querySelector('.mstatus');
  if(st){
    st.className='mstatus '+(state==='failed'?'fail':'sending');
    st.textContent=state==='failed'?'ошибка':'отправка…';
  }
  /* add retry button if not present */
  if(state==='failed'&&!el.querySelector('.retry-btn')){
    const rb=document.createElement('button');
    rb.className='retry-btn';rb.textContent='повторить';
    rb.onclick=()=>retryPending(pid);
    el.querySelector('.mtime').appendChild(rb);
  }
}



function retryPending(pid){
  /* find text from DOM, re-queue */
  const el=document.querySelector(`[data-pending-id="${pid}"]`);
  if(!el) return;
  const text=el.querySelector('.mbubble').textContent;
  el.classList.remove('failed');
  el.classList.add('pending');
  const st=el.querySelector('.mstatus');
  if(st){st.className='mstatus sending';st.textContent='отправка…'}
  const rb=el.querySelector('.retry-btn');
  if(rb) rb.remove();
  S.queue.push({pid,text,attempts:0});
  flushQueue();
}

/* ════════════════════════════════
   COPY PASSWORD
════════════════════════════════ */
$('copyBtn').addEventListener('click',async()=>{
  try{await navigator.clipboard.writeText(S.pass)}catch(_){}
  const b=$('copyBtn');
  b.style.color='var(--green)';
  b.title='Скопировано!';
  setTimeout(()=>{b.style.color='';b.title='Скопировать пароль норы'},1800);
});

/* ════════════════════════════════
   LOGOUT
════════════════════════════════ */
$('logoutBtn').addEventListener('click',()=>{
  confirm('Выход','Выйти из норы?','Выйти',(idx)=>{
    if(idx!==1) return;
    clearInterval(S.timer);
    S={topic:'',nick:'',pass:'',since:0,timer:null,known:new Set(),queue:[],sending:false};
    $('chat').style.display='none';
    $('login').style.display='';
    $('loginBtn').disabled=false;
    $('uname').value='';$('rpass').value='';$('err').textContent='';
    renderChips();
  });
});

/* ════════════════════════════════
   INPUT HELPERS
════════════════════════════════ */
function autoResize(){
  const t=$('minput');t.style.height='auto';
  t.style.height=Math.min(t.scrollHeight,120)+'px';
}
$('minput').addEventListener('input',()=>{
  autoResize();
  $('sendBtn').disabled=$('minput').value.trim()==='';
});
$('minput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!$('sendBtn').disabled)sendMsg()}
});
$('sendBtn').addEventListener('click',sendMsg);
$('loginBtn').addEventListener('click',doLogin);
$('rpass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
$('uname').addEventListener('keydown',e=>{if(e.key==='Enter')$('rpass').focus()});

/* ════════════════════════════════
   INIT
 ════════════════════════════════ */
initSec('nickSecHdr','nickSecBody');
initSec('roomSecHdr','roomSecBody');
renderChips();

const last=getLastUsed();
if(last&&last.n&&last.r){
  $('uname').value=last.n;
  $('rpass').value=last.r;
  doLogin();
}

$('pastePass').addEventListener('click',async()=>{
  const doPaste=async()=>{
    try{
      const txt=await navigator.clipboard.readText();
      if(txt){$('rpass').value=txt;renderChips()}
    }catch(e){alert('Ошибка','Нет доступа к буферу обмена. Вставьте пароль вручную.','ОК',()=>{$('rpass').focus()})}
  };
  try{
    const perm=await navigator.permissions.query({name:'clipboard-read'});
    if(perm.state==='granted'){doPaste();return}
    if(perm.state==='prompt'){
      confirm('Доступ к буферу','Приложению нужен доступ к буферу обмена для вставки пароля. Разрешить?','Разрешить',(idx)=>{
        if(idx===1)doPaste();
        else $('rpass').focus();
      });
      return;
    }
  }catch(e){alert('Ошибка','Браузер не поддерживает автоматическую вставку. Вставьте пароль вручную.','ОК',()=>{$('rpass').focus()})}
});

$('genPass').addEventListener('click',()=>{
  const dice='⚀⚁⚂⚃⚄⚅';
  let pass='';
  for(let i=0;i<8;i++)pass+=dice[Math.floor(Math.random()*6)];
  $('rpass').value=pass;
  $('rpass').type='text';
  renderChips();
});
</script>
